schema: spec-driven

context: |
  # Shifty Backend
  Employee shift planning & HR management system.

  ## Tech Stack
  - Language: Rust
  - Web framework: Axum
  - Database: SQLite via SQLx (compile-time query checking)
  - API docs: OpenAPI via utoipa
  - Testing: mockall for mocks, in-memory SQLite for integration tests
  - Deployment: NixOS (shifty-nix)

  ## Architecture
  Clean layered architecture: REST → Service → DAO → SQLite

  Multi-crate workspace:
  - shifty_bin: Main executable with dependency injection
  - service: Business logic trait definitions
  - service_impl: Concrete service implementations
  - dao: Data access trait definitions
  - dao_impl_sqlite: SQLite-specific DAO implementations
  - rest: HTTP API endpoints (Axum handlers)
  - rest-types: Transport objects (DTOs) with OpenAPI schemas
  - shifty-utils: Shared utilities

  ## Key Patterns
  - Services defined as traits, DI via gen_service_impl! macro
  - DAO traits: only dump_all, create, update, and delete/clear_all have concrete impls; all other methods are default trait methods that build on these
  - All service methods accept Option<Transaction> for transaction management
  - Authentication context passed through all service calls
  - Soft deletes (WHERE deleted IS NULL)
  - REST endpoints require #[utoipa::path] annotations
  - DTOs require ToSchema derive for OpenAPI

  ## Domain Concepts
  - Sales Persons: Employee entities with working hour contracts
  - Shift Plans / Slots: Time slots defining when work can be scheduled
  - Bookings: Assignments of employees to specific slots
  - Extra Hours: Overtime, vacation, holidays, sick leave tracking
  - Balance Hours: Calculated surplus/deficit of worked vs expected hours
  - Carryover Hours: Year-end balance persistence
  - Special Days: Holidays and company events
  - Billing Periods: Time periods for aggregating work hours

  ## Conventions
  - i18n: Three languages (En, De, Cs) — add translations for all three
  - Feature flags: mock_auth, oidc, local_logging, json_logging
  - All artifacts and documentation in English
  - Billing period snapshot schema versioning: persisted `billing_period` rows carry a `snapshot_schema_version` stamped from `service_impl::billing_period_report::CURRENT_SNAPSHOT_SCHEMA_VERSION`. Bump that constant by one whenever a change adds, removes, renames, or alters the computation of any persisted `value_type` on `billing_period_sales_person`, so snapshot validators can distinguish a schema change from a data bug.

rules:
  proposal:
    - Write all content in English
  design:
    - Write all content in English
  tasks:
    - Write all content in English
    - "Follow Test Driven Development (TDD): structure tasks in three phases:"
    - "Phase 1 (Scaffolding): Add new fields, types, dependencies, and stub methods with todo!() or unimplemented!() — just enough to make the project compile. Do NOT write actual implementation logic (e.g., SQL queries, business logic) in this phase."
    - "Phase 2 (Red): Write all tests based on the spec requirements. Tests should compile but fail because the stubs are not yet implemented."
    - "Phase 3 (Green): Implement the actual logic until all tests pass."
    - "If the change adds, removes, renames, or alters the computation of any persisted `value_type` on `billing_period_sales_person`, include an explicit subtask to bump `service_impl::billing_period_report::CURRENT_SNAPSHOT_SCHEMA_VERSION` by one (see CLAUDE.md → Billing Period Snapshot Schema Versioning)."
  specs:
    - Write all content in English
